name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static artifact
        run: |
          mkdir -p _site
          tar --exclude=.git --exclude=.github -cf - . | tar -xf - -C _site

      - name: Inject Web3Forms key into artifact
        env:
          WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}
        run: |
          if [ -z "$WEB3FORMS_KEY" ]; then
            echo "WEB3FORMS_KEY secret is not configured."
            exit 1
          fi

          sed -i "s|PLACEHOLDER_WEB3FORMS_KEY|$WEB3FORMS_KEY|g" _site/index.html

          if grep -q "PLACEHOLDER_WEB3FORMS_KEY" _site/index.html; then
            echo "Placeholder replacement failed."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
